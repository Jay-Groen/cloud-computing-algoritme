steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/trainingsapp/trainingsapp:$COMMIT_SHA'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/trainingsapp/trainingsapp:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trainingsapp'
      - '--image'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/trainingsapp/trainingsapp:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'CLOUD_SQL_INSTANCE_CONNECTION_NAME=$_CLOUD_SQL_INSTANCE,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER'
      - '--set-secrets'
      - 'DB_PASS=db-password:latest'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--add-cloudsql-instances'
      - '$_CLOUD_SQL_INSTANCE'

substitutions:
  _CLOUD_SQL_INSTANCE: 'your-project:europe-west4:trainingsapp-db'
  _DB_NAME: 'trainingsapp'
  _DB_USER: 'trainingsapp_user'

images:
  - 'europe-west4-docker.pkg.dev/$PROJECT_ID/trainingsapp/trainingsapp:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
